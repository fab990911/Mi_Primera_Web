<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Primer Despliegue | Taller de Redes y Hosting</title>
    <style>
        /* Estilos base atractivos y modernos */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8;
            color: #2d3748;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            background: white;
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            text-align: center;
            max-width: 450px;
            width: 90%;
            border-top: 8px solid #3b82f6; /* Detalle azul tecnológico */
        }

        .badge-online {
            background-color: #10b981;
            color: white;
            padding: 0.25rem 0.75rem;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        h1 {
            margin: 0 0 0.5rem 0;
            color: #1e3a8a;
            font-size: 1.8rem;
        }

        p {
            color: #64748b;
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        .student-box {
            background-color: #f8fafc;
            border: 1px dashed #cbd5e1;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 2rem;
        }

        .student-box h2 {
            font-size: 1rem;
            margin: 0 0 0.25rem 0;
            color: #475569;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* Input para que editen su nombre fácilmente */
        .student-name {
            font-size: 1.3rem;
            font-weight: bold;
            color: #3b82f6;
            margin: 0;
        }

        footer {
            font-size: 0.8rem;
            color: #94a3b8;
            border-top: 1px solid #e2e8f0;
            padding-top: 1rem;
        }
    </style>
</head>
<body>

    <div class="card">
        <!-- Indicador de éxito para cuando esté en Internet -->
        <span class="badge-online">● ¡Sitio Web En Línea!</span>
        
        <h1>¡Hola Mundo desde Internet!</h1>
        <p>Esta página web fue desplegada con éxito utilizando los conocimientos de redes, DNS y servidores aprendidos en el taller práctico.</p>

        <!-- Sección diseñada para que el alumno la personalice en clase -->
        <div class="student-box">
            <h2>Proyecto publicado por:</h2>
            <p class="student-name">[Profe Muñoz Hector Fabian]</p>
        </div>

        <footer>
            Taller Práctico: De la Red a la Web &copy; 2026
        </footer>
    </div>

</body>
</html>
